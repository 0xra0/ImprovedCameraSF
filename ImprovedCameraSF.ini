[Settings]
fTPWorldFOV=94.0
fFPWorldFOV=94.0

[PseudoFP]
fFOV=85.0
bUltraRigidHeadAttach=1
bUltraRigidIgnoreSanityChecks=false
fHeadAttachGraceFrames=120
fUltraRigidMaxPlanarOffset=1.5
fUltraRigidHeightTolerance=3.5
fUltraRigidBaseForward=0
fUltraRigidMotionForward=0
; --- Eye position offset (meters) from the head bone / head-mesh center ---
; Starfield has no dedicated eye node, so the camera anchors to the head
; CENTER. Without these offsets the view sits inside the skull ("camera in
; head"). These defaults push it forward to the face and up to the eyes.
; Active path here is bUltraRigidHeadAttach=1, which uses fForwardOffset +
; fUpOffset (fSideOffset for left/right). Increase fUpOffset if still too low.
; Measured from the debug log: with fUpOffset=0.06 the camera sat ~0.16 m
; BELOW eye level (jaw height) -> you saw your own eyes/face from below.
; 0.20 raises it to ~eye level (head-anchor ~1.28 m above feet, eyes ~1.49 m).
; Tune in ~0.02 steps: higher = camera up; if you see over your brow, lower it.
fNoseForward= 0
fUpOffset = 0.20        ; up to eye level (was 0.06 = too low / saw own face)
fForwardOffset = 0.12   ; forward past the face (raise toward 0.15 if head clips)
fSideOffset = 0         ; left/right centering (positive = right)
; --- Head hide via camera near-clip plane ---
; Bone cull/scale can't reliably hide the head in Starfield (the animation
; graph rewrites the pose each frame). Instead we push the render camera's
; near-clip plane out so the head geometry right in front of the camera is
; clipped away. Works even on a single merged body mesh.
; fHeadClipNear = distance (world units, ~meters) of the near plane while
; pseudo-FP is active. Larger = more of the head (and anything close) is cut.
; If the head still shows, raise it (0.20, 0.25, 0.30...). If your weapon/hands
; or body get clipped when looking down, lower it. Set bHideHeadNearClip=0 to
; disable. See HEADCLIP_INIT in ImprovedCameraSF_debug.log for the original near.
bHideHeadNearClip = 1
fHeadClipNear = 0.28     ; sweet spot: cuts head (~0.22m) but spares more of the suit; 0.35 clipped the chest
fMaxYawDegrees=90
;fNoseForward - offset nosa do przodu
;fMaxYawDegrees=90.000000 - maksymalny kąt rozglądania (90 stopni w każdą stronę)
fDebugOffsetX = 0     ; przesuwa wzdłuż osi X świata
fDebugOffsetY = 0    ; przesuwa wzdłuż osi Y świata
fDebugOffsetZ = 0     ; przesuwa wzdłuż osi Z świata
